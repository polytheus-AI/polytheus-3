<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/Homepage.css">
    <script src="../JS/Homepage.js" defer></script>
    <meta name="keywords" content="AI, Evolutionary software, Evolutionary algorithms, Universal software, Self-improving software, best IA, Multi agent system">
    <meta name="description" content="Polytheus is a universal software application based on a multi-agent system that combines the best AI, algorithms, and data to enable anyone to access any webpage on the fly.">
    <link rel="icon" type="image/png" href="/src/tools/Images/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/src/tools/Images/favicon/favicon.svg" />
    <link rel="shortcut icon" href="tools/Images/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/src/tools/Images/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="/src/tools/Images/favicon/site.webmanifest" />
    <title>Polytheus: The Universal Software</title>
</head>
<body>
    <header>
        <div class="top-left">
            <button class="gear-btn">
                <img src="../Images/gear.svg" alt="Settings">
            </button>
            <button class="token-btn">
                <img src="../Images/diamond.webp" alt="Diamond" class="icon">
                <span class="count">100</span>
            </button>
        </div>
        <div>
            <button class="avatar-container">
                <img src="../Images/logo.webp" alt="avatar of Polytheus" class="avatar-img">
            </button>
        </div>
    </header>

    <main class="main-section">
        <h1 class="main-title">POLYTHEUS</h1>
        <p class="main-subtitle">Generate a 3D model from an image</p>
    </main>

    <footer class="input-container">
        <div class="search-bar">
            <input type="text" placeholder="What did you want ?" id="search-input">
        </div>
    </footer>

</body>
</html>
