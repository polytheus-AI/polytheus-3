<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Body -->
  <ellipse cx="100" cy="110" rx="60" ry="70" fill="#d9b56d"/>

  <!-- Head -->
  <circle cx="100" cy="80" r="55" fill="#e6c27a"/>

  <!-- Ears -->
  <polygon points="55,35 70,10 85,40" fill="#caa25c"/>
  <polygon points="145,35 130,10 115,40" fill="#caa25c"/>

  <!-- Eyes -->
  <circle cx="75" cy="80" r="20" fill="#444"/>
  <circle cx="125" cy="80" r="20" fill="#444"/>

  <!-- Iris -->
  <circle cx="75" cy="80" r="12" fill="#f2c94c"/>
  <circle cx="125" cy="80" r="12" fill="#f2c94c"/>

  <!-- Pupils -->
  <circle cx="75" cy="80" r="6" fill="#000"/>
  <circle cx="125" cy="80" r="6" fill="#000"/>

  <!-- Beak -->
  <polygon points="100,90 90,110 110,110" fill="#d4a017"/>
</svg>