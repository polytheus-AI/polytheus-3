<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--<link rel="stylesheet" href="../CSS/Homepage.css">-->
    <meta name="keywords" content="AI, Evolutionary software, Evolutionary algorithms, Universal software, Self-improving software, best IA, Multi agent system">
    <meta name="description" content="Polytheus is a universal software application based on a multi-agent system that combines the best AI, algorithms, and data to enable anyone to access any webpage on the fly.">
    <link rel="icon" type="image/png" href="../Images/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="../Images/favicon/favicon.svg" />
    <link rel="shortcut icon" href="../Images/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="../Images/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="../Images/favicon/site.webmanifest" />
    <script src="../WebComponents/GearButton.js" defer></script>
    <script src="../WebComponents/TokenButton.js" defer></script>
    <script src="../WebComponents/AvatarButton.js" defer></script>
    <script src="../WebComponents/MainSection.js" defer></script>
    <script src="../WebComponents/PromptBar.js" defer></script>
    <link rel="stylesheet" href="../CSS/Homepage.css">
    <title>Polytheus: The Universal Software</title>
</head>
<body>
    <header>
        <div class="top-left">
            <gear-button>
                <button class="gear-btn">
                    <img src="../Images/gear.svg" alt="Settings" class="gear-img">
                </button>
            </gear-button>
            <token-button>
                <button class="token-btn">
                    <img src="../Images/diamond.svg" alt="Diamond" class="icon">
                    <span class="count">100</span>
                </button>
            </token-button>
        </div>
        <avatar-button>
            <button class="avatar-btn">
                <img src="../Images/logo.svg" alt="avatar of Polytheus" class="avatar-img">
            </button>
        </avatar-button>
    </header>
    
    <main class="main-section">
        <main-section>
            <h1 class="main-title">POLYTHEUS</h1>
            <p class="main-subtitle">Generate a 3D model from an image</p>
        </main-section>
    </main>

    <footer class="input-container">
        <prompt-bar class="search-bar">
            <input type="text" placeholder="What did you want ?" id="search-input">
            <button class="send-btn">
                <img src="../Images/paper-plane.svg" alt="Send" class="send-img">
            </button>
        </prompt-bar>
    </footer>
    <script type="module">
        const APP_VERSION = await fetch("/app_version")
            .then(response => response.text());

        console.log(APP_VERSION);

        const savedVersion = localStorage.getItem("app_version");

        if (savedVersion !== APP_VERSION) {
            console.log("Nouvelle version ou première visite");

            const script = document.createElement("script");
            script.src = "../JS/Onboarding.js";
            script.type = "module";

            document.head.appendChild(script);

            localStorage.setItem("app_version", APP_VERSION);
        } else {
            console.log("Version actuelle");
        }
    </script>
</body>
</html>
